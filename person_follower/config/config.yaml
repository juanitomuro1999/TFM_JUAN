control_node:
  ros__parameters:
    enabled: True
    # camera_enabled: True  → FSM espera gesto "start_tracking" de la cámara
    # camera_enabled: False → FSM empieza a seguir automáticamente sin gesto (modo headless)
    camera_enabled: True
    # Tiempo (s) que el robot sigue moviéndose tras perder la detección antes de parar
    tracking_loss_timeout: 1.5

tracking_node:
  ros__parameters:
    enabled: True
    max_speed: 0.18         # m/s máximo (bajado de 0.3 el 2026-07-09 para pruebas de gesto más suaves)
    target_distance: 1.0    # m — zona muerta: el robot se para a esta distancia
    acc_limit: 0.05         # m/s por ciclo de scan (≈0.5 m/s² a 10 Hz)
    ang_acc_limit: 0.3      # rad/s por ciclo de scan — evita que wz salte a saturación en 1 ciclo
    angular_gain: 2.0       # ganancia proporcional del giro (Kp)
    angular_d_gain: 0.3     # ganancia derivativa del giro (Kd) — amortigua oscilaciones
    vel_ramp_exp: 1.5       # exponente rampa velocidad (1=lineal, 2=cuadrática suave)
    kalman_q: 0.01          # reducido: estimación de velocidad más suave
    kalman_r: 0.15          # aumentado: posición medida con más filtrado → menos oscilación
    obstacle_avoidance_enabled: True
    # m — obstáculos más cercanos que esto activan evasión. Medido desde el
    # LIDAR, no desde el borde físico del robot: offset LIDAR→borde delantero
    # medido en el chasis real el 2026-07-22 = 0.15m (Kobuki, LIDAR montado en
    # el centro, diámetro ~30-32cm). Con 0.35m el margen real hasta el borde
    # era solo 0.20m — causa del 2º choque del 2026-07-21 (evasión activada a
    # tiempo, contacto igual). Subido a 0.40m (margen real 0.25m) manteniendo
    # colchón por debajo de los 0.49m del suelo de near_gain (2026-07-15) para
    # no confundir a la propia persona seguida con un obstáculo en seguimiento
    # cercano — ver docs/decisiones.md (2026-07-22).
    obstacle_threshold: 0.40
    # Arranque suave: los primeros startup_ramp_s segundos tras activar el
    # seguimiento, el techo de |wz| sube linealmente de startup_max_wz a 1.0
    # en vez de permitir ya el máximo. Añadido 2026-07-09 en vivo: si el
    # error de rumbo es grande al activar (persona casi detrás del robot),
    # el giro de corrección se veía muy brusco aunque físicamente correcto.
    startup_ramp_s: 1.5
    startup_max_wz: 0.5
    # Tiempo (s) sin recibir /person_position antes de que tracking_node pare
    # localmente (predicción Kalman durante oclusión breve, parada dura tras
    # esto). Antes hardcodeado (self.timeout_s=2.0, no era parámetro de ROS) —
    # parametrizado 2026-07-13 para que quede junto a tracking_loss_timeout
    # (control_node, arriba) y detection_loss_frames (detection_node, abajo):
    # son tres mecanismos de timeout independientes que no se coordinan entre
    # sí, ver docs/decisiones.md.
    observation_timeout: 2.0
    # Añadido 2026-07-15 (docs/decisiones.md): pasado este tiempo sin
    # observación fresca, el robot para (no sigue extrapolando con Kalman)
    # aunque todavía no se haya alcanzado observation_timeout. Diagnosticado
    # que LIDAR+cámara pueden perder a la persona a la vez ~2-4s reales al
    # girar, y extrapolar todo ese hueco hacía que el robot "girara al lado
    # contrario" persiguiendo una posición ya poco fiable.
    extrapolation_limit_s: 0.6

visual_detection_node:
  ros__parameters:
    # Detección visual con HOG (OpenCV) o MediaPipe (si instalado).
    # No requiere usb_cam ni cv_bridge — captura directa de /dev/video0.
    enabled: True
    camera_device: 0           # índice de /dev/videoN (0 = C270)
    frame_width: 320
    frame_height: 240
    detection_interval: 0.4    # s entre frames procesados (~2.5 Hz)
    use_mediapipe: True        # usar MP si disponible, si no → HOG automático
    # HOG detector
    hog_win_stride: 8
    hog_scale: 1.05
    hog_padding: 8
    hog_min_weight: 0.25       # umbral confianza HOG (mayor = menos falsos positivos)
    hog_center_crop_ratio: 0.7 # analizar solo el 70% central del frame
    # Gestos (requieren MediaPipe; con HOG no hay landmarks y no se detectan)
    gesture_confirm_frames: 3   # frames consecutivos para confirmar el gesto
    gesture_cooldown_s: 2.0     # s mínimos entre comandos de gesto
    gesture_min_visibility: 0.5 # visibilidad mínima muñeca/hombro/cadera (bajado de 0.6 en sesión 2026-07-09: geometría del gesto ya correcta, visibilidad de muñeca izquierda quedaba pegada al umbral)
    gesture_margin_ratio: 0.15  # margen sobre el hombro, relativo al torso
    # Fusión cámara+LIDAR: rumbo horizontal de la persona
    camera_hfov_deg: 51.0       # FOV horizontal del C270 (~51° en 4:3)

detection_node:
  ros__parameters:
    enabled: True
    # ── DBSCAN ────────────────────────────────────────────────────────────
    # RPLIDAR A2M8 a 1m → ~57 pts/m de arco
    # Con interpolación x2 → ~114 pts/m → pierna 0.1m → 10-12 pts interpolados
    dbscan_eps: 0.12              # m — distancia máxima entre pts del mismo clúster
    dbscan_min_samples: 4         # mínimo de pts para formar clúster (bajado de 5)
    # ── Filtros de clúster de pierna ──────────────────────────────────────
    min_leg_cluster_size: 4       # BUG FIX: era 5 con comparación estricta (> 5 = 6+ pts)
    max_leg_cluster_size: 200     # ampliado: pierna cercana puede tener >150 pts interp.
    # ── Radio del clúster de pierna ───────────────────────────────────────
    # Radio medio del clúster desde su centroide.
    # A 1m con 10 pts en 0.1m: radio ≈ 0.03-0.08m
    # A 0.5m con 20 pts en 0.1m: radio ≈ 0.02-0.06m
    min_leg_radius: 0.01          # m (sin cambio)
    max_leg_radius: 0.15          # m (BUG FIX: era 0.05 → rechazaba ~50% de piernas)
    # ── Distancia entre centros de los dos clústeres de pierna ────────────
    min_leg_distance: 0.05        # m (ligeramente aumentado de 0.04)
    max_leg_distance: 0.35        # m (ligeramente aumentado de 0.30)
    # ── Persistencia temporal (anti-sillas/falsos positivos) ──────────────
    # Un objeto debe verse N scans seguidos para ser "persona".
    # Sillas estáticas generan detecciones intermitentes → quedan filtradas.
    max_detection_distance: 2.5    # reducido de 6.0 — elimina pares de piernas lejanos erróneos
    detection_confirm_frames: 3   # scans consecutivos para confirmar persona
    detection_loss_frames: 8      # aumentado de 4 — evita IDLE↔TRACKING rápido
    # ── Fusión cámara+LIDAR (fallback cuando no hay par de piernas) ────────
    # Si el LIDAR no distingue dos piernas pero la cámara da rumbo, se toma el
    # clúster general más alineado con ese rumbo → posición robusta.
    fusion_enabled: True
    fusion_angle_tol_deg: 25.0    # tolerancia angular clúster vs rumbo cámara
    fusion_max_distance: 4.0      # alcance máx. del fallback (m) — supera max_detection_distance
    bearing_sign: -1.0            # signo cámara→láser (CALIBRAR en vivo desde los logs)
    bearing_timeout: 1.5          # validez del último rumbo (s); cámara ~2.5 Hz
    camera_timeout: 1.0           # s sin detección visual antes de invalidarla
    # Detecciones visuales consecutivas para volver a considerar "cam válida"
    # tras un False. Bajado de 2 a 1 el 2026-07-15: a ~2.5Hz (coste de
    # MediaPipe), un solo frame de motion blur durante un giro ya costaba
    # ~800ms extra de "cámara no válida" encima de la propia pérdida real
    # (ver docs/decisiones.md, 2026-07-15).
    camera_debounce_count: 1
    # ── Filtro de continuidad (anti-salto a clusters espurios) ────────────
    # Rechaza el candidato/cluster si implica una velocidad > max_person_speed
    # respecto a la última posición publicada (ver detection_node._gate_by_continuity).
    max_person_speed: 2.0         # m/s — cota física (marcha rápida/trote ligero)
    position_jump_margin: 0.3     # m — margen extra sobre max_person_speed*dt (ruido de medida)
    # Scans consecutivos con un candidato CONSISTENTE (mismo punto, tolerancia
    # position_jump_margin) fuera de max_jump antes de aceptarlo como
    # reanclaje real. 1 = comportamiento anterior, sin espera. Subido a 3
    # el 2026-07-21 (Sesión 4): medido en vivo con mobiliario denso que con
    # valor 1 colaban saltos >0.8m en el 12.9% de las muestras (máx 3.40m,
    # sobre todo vía el fallback de pierna única nuevo) — ver
    # docs/decisiones.md, 2026-07-21.
    continuity_confirm_frames: 3
    # Deriva acumulada máxima respecto a la posición confirmada de hace
    # continuity_window_s segundos (no solo el salto frame a frame). Añadido
    # 2026-07-09 en vivo: una cadena de clústeres espurios adyacentes (p.ej.
    # patas de una silla) puede "caminar" salto a salto, cada uno plausible
    # por separado, y trazar un barrido de varios metros alrededor del robot.
    continuity_window_s: 1.0

user_interface_node:
  ros__parameters:
    enabled: True
