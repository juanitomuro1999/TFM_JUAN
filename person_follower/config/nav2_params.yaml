# nav2_params.yaml — Parametros de la pila Nav2 para el TurtleBot2/Kobuki del TFM.
#
#   ⚠️  ANDAMIAJE PARA TUNEAR EN EL NUC. Escrito sin acceso al robot, fundamentado
#       en los frames/topics reales del sistema (ver slam_toolbox_params.yaml):
#         map_frame=map · odom_frame=odom · base_frame=base_footprint
#         scan=/scan · cmd_vel a la base=/commands/velocity · laser hasta 12 m
#       Kobuki = base diferencial, radio ~0.18 m.
#
#   VERIFICAR EN JULIO contra los defaults instalados en el NUC:
#     ros2 pkg prefix nav2_bringup    # .../share/nav2_bringup/params/nav2_params.yaml
#   Los STRINGS DE PLUGIN y algun nombre de parametro cambian entre distros de ROS 2.
#   Aqui se usa la convencion de Jazzy (namespacing con "::"). Si un nodo no arranca
#   por "failed to load plugin", comparar el string con el default de tu version
#   (distros antiguas usan "/" en vez de "::", p.ej. "nav2_navfn_planner/NavfnPlanner").

# ─────────────────────────────────────────────────────────────────────────────
# AMCL — localizacion sobre el mapa guardado
# ─────────────────────────────────────────────────────────────────────────────
amcl:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "scan"
    robot_model_type: "nav2_amcl::DifferentialMotionModel"  # Kobuki = diferencial
    laser_max_range: 12.0          # coincide con max_laser_range del RPLIDAR A2M8
    laser_min_range: -1.0
    max_beams: 60
    min_particles: 500
    max_particles: 2000
    # Ruido de odometria diferencial (alpha1..5). Defaults razonables para Kobuki.
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    update_min_a: 0.2
    update_min_d: 0.25
    resample_interval: 1
    transform_tolerance: 1.0
    tf_broadcast: true
    set_initial_pose: false        # se fija la pose inicial desde RViz (2D Pose Estimate)

# ─────────────────────────────────────────────────────────────────────────────
# BT NAVIGATOR — arbol de comportamiento de navegacion
# ─────────────────────────────────────────────────────────────────────────────
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # Si no se especifican, Nav2 usa los BT por defecto (navigate_to_pose /
    # navigate_through_poses), suficiente para la demo.

# ─────────────────────────────────────────────────────────────────────────────
# CONTROLLER SERVER — seguimiento de trayectoria local (DWB)
# ─────────────────────────────────────────────────────────────────────────────
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0     # 10 Hz va bien con /scan a 10 Hz
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    # NOTA Jazzy: plurales. En Humble eran singulares
    #   (progress_checker_plugin / goal_checker_plugin).
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: true

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      # Velocidades — conservadoras para interior. Kobuki admite mas, pero
      # alineadas con el max_speed del seguidor (0.3 m/s) para coherencia.
      min_vel_x: 0.0
      max_vel_x: 0.26
      min_vel_y: 0.0
      max_vel_y: 0.0               # diferencial: sin desplazamiento lateral
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.26
      min_speed_theta: 0.0
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 1                # diferencial: 1 sola muestra en y
      vtheta_samples: 20
      sim_time: 1.7
      transform_tolerance: 0.2
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign",
                "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

# ─────────────────────────────────────────────────────────────────────────────
# PLANNER SERVER — planificador global (NavFn)
# ─────────────────────────────────────────────────────────────────────────────
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"  # Jazzy "::"  (Humble: "/")
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

# ─────────────────────────────────────────────────────────────────────────────
# BEHAVIOR SERVER — recuperaciones (girar, retroceder, esperar)
# ─────────────────────────────────────────────────────────────────────────────
behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    # Limites de velocidad de las recuperaciones (diferencial)
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

# ─────────────────────────────────────────────────────────────────────────────
# COSTMAP GLOBAL — mapa estatico + obstaculos del LIDAR + inflado
# ─────────────────────────────────────────────────────────────────────────────
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_footprint
      update_frequency: 1.0
      publish_frequency: 1.0
      robot_radius: 0.18           # Kobuki ~0.354 m de diametro
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

# ─────────────────────────────────────────────────────────────────────────────
# COSTMAP LOCAL — ventana rodante alrededor del robot
# ─────────────────────────────────────────────────────────────────────────────
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_footprint
      update_frequency: 5.0
      publish_frequency: 2.0
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.18
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 12.0
          obstacle_max_range: 10.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

# ─────────────────────────────────────────────────────────────────────────────
# MAP SERVER — sirve el mapa guardado (yaml_filename lo fija el launch)
# ─────────────────────────────────────────────────────────────────────────────
map_server:
  ros__parameters:
    use_sim_time: false
    # yaml_filename se inyecta desde nav2_bringup.launch.py (mapa en el share)

# ─────────────────────────────────────────────────────────────────────────────
# VELOCITY SMOOTHER — suaviza el cmd_vel antes de la base (opcional pero util)
# ─────────────────────────────────────────────────────────────────────────────
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.26, 0.0, 1.0]
    min_velocity: [-0.26, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
