# Parámetros del nodo Kobuki para el robot TFM (nuc-225)
# Copiar a: ~/kobuki_ws/install/kobuki_node/share/kobuki_node/config/kobuki_node_params.yaml

kobuki_ros_node:
  ros__parameters:
    acceleration_limiter: false
    battery_capacity: 16.5
    battery_low: 14.0
    battery_dangerous: 13.2
    device_port: /dev/kobuki       # ttyUSB1 en nuc-225
    cmd_vel_timeout_sec: 0.6
    odom_frame: odom
    base_frame: base_footprint
    publish_tf: true
    use_imu_heading: true
    wheel_left_joint_name: wheel_left_joint
    wheel_right_joint_name: wheel_right_joint
